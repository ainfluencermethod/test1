<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>AI Universa — Nina Krajnc</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@1,500;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .card {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(165deg, #0a0c1e 0%, #0f1129 35%, #111827 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 64px;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -120px;
    right: -120px;
    width: 450px;
    height: 450px;
    background: radial-gradient(circle, rgba(244, 114, 182, 0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 56px;
    position: relative;
    z-index: 1;
  }

  .logo-box {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #7c3aed, #b388ff);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 15px;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .brand-name {
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .quote-section {
    flex: 1;
    display: flex;
    align-items: flex-start;
    position: relative;
    z-index: 1;
    padding-right: 20px;
  }

  .quote-mark {
    font-family: 'Playfair Display', serif;
    font-size: 120px;
    color: #a855f7;
    opacity: 0.3;
    line-height: 0.8;
    position: absolute;
    top: -20px;
    left: -8px;
  }

  .quote-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 34px;
    line-height: 1.45;
    color: #fff;
    padding-left: 10px;
    padding-top: 24px;
    font-weight: 500;
  }

  .person-section {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a855f7, #d946ef);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 22px;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 24px rgba(168, 85, 247, 0.35);
  }

  .person-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .person-name {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
  }

  .person-detail {
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    font-weight: 400;
  }

  .result-box {
    background: linear-gradient(135deg, rgba(107, 251, 130, 0.08) 0%, rgba(107, 251, 130, 0.03) 100%);
    border: 1px solid rgba(107, 251, 130, 0.2);
    border-radius: 16px;
    padding: 28px 36px;
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  .result-main {
    font-size: 40px;
    font-weight: 800;
    color: #6bfb82;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  .result-sub {
    font-size: 20px;
    font-weight: 500;
    color: rgba(107, 251, 130, 0.7);
    margin-top: 6px;
  }

  .metric-tag {
    display: inline-block;
    background: rgba(168, 85, 247, 0.15);
    border: 1px solid rgba(168, 85, 247, 0.25);
    border-radius: 8px;
    padding: 6px 16px;
    font-size: 15px;
    font-weight: 600;
    color: #c084fc;
    margin-top: 12px;
  }

  .bottom-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }

  .stars {
    font-size: 26px;
    color: #fbbf24;
    letter-spacing: 4px;
  }

  .cta {
    font-size: 17px;
    font-weight: 700;
    color: #6bfb82;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cta-arrow {
    font-size: 22px;
  }

  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .accent-line {
    position: absolute;
    top: 0;
    left: 64px;
    right: 64px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #a855f7, #d946ef, #a855f7, transparent);
    border-radius: 2px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="noise"></div>
  <div class="accent-line"></div>

  <div class="header">
    <div class="logo-box">AI</div>
    <span class="brand-name">AI Universa</span>
  </div>

  <div class="quote-section">
    <span class="quote-mark">"</span>
    <p class="quote-text">Pri dvajsetih podpisujem sponzorske pogodbe. Moji prijatelji ne morejo verjeti.</p>
  </div>

  <div class="person-section">
    <div class="avatar">NK</div>
    <div class="person-info">
      <div class="person-name">Nina Krajnc, 20</div>
      <div class="person-detail">Koper</div>
    </div>
  </div>

  <div class="result-box">
    <div class="result-main">23,000+ sledilcev</div>
    <div class="result-sub">na TikToku</div>
    <div class="metric-tag">✨ Sponzorske pogodbe</div>
  </div>

  <div class="bottom-section">
    <div class="stars">★★★★★</div>
    <div class="cta">Brezplačna delavnica <span class="cta-arrow">→</span></div>
  </div>
</div>
</body>
</html>
