<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>AI Universa — Dan 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #0a0a12;
    position: relative;
  }
  .glow {
    position: absolute; border-radius: 50%; filter: blur(120px); opacity: .45;
  }
  .glow-1 { width: 700px; height: 700px; background: #6d28d9; top: -150px; left: -200px; }
  .glow-2 { width: 500px; height: 500px; background: #a78bfa; bottom: -150px; right: -100px; opacity: .3; }

  .avatar {
    position: absolute; top: 80px; right: 80px;
    width: 260px; height: 260px; border-radius: 50%;
    background: linear-gradient(135deg, #6d28d9, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 60px rgba(109,40,217,.6), 0 0 120px rgba(109,40,217,.3);
    z-index: 2;
  }
  .avatar span {
    font-size: 140px; font-weight: 900; color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,.4);
  }

  .day {
    position: absolute; top: 60px; left: 80px;
    font-size: 200px; font-weight: 900; color: #fff;
    line-height: 1; z-index: 2;
    text-shadow: 0 0 40px rgba(167,139,250,.7), 0 0 80px rgba(109,40,217,.4);
  }
  .day small {
    font-size: 72px; display: block; font-weight: 700;
    color: #a78bfa; margin-top: -10px;
  }

  .subtitle {
    position: absolute; bottom: 200px; left: 80px;
    font-size: 52px; font-weight: 900; color: #fff;
    z-index: 2;
    text-shadow: 0 2px 20px rgba(0,0,0,.6);
    max-width: 700px;
  }

  .badge {
    position: absolute; bottom: 60px; left: 80px;
    background: rgba(109,40,217,.85);
    border: 2px solid #a78bfa;
    border-radius: 50px; padding: 16px 40px;
    font-size: 32px; font-weight: 700; color: #fff;
    letter-spacing: 2px; z-index: 2;
    box-shadow: 0 0 30px rgba(109,40,217,.5);
  }

  .green-accent {
    position: absolute; bottom: 0; right: 0;
    width: 100%; height: 8px;
    background: linear-gradient(270deg, #6bfb82, #6bfb82 40%, transparent);
    z-index: 3;
  }
  .green-dot {
    position: absolute; top: 90px; right: 370px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #6bfb82; z-index: 3;
    box-shadow: 0 0 20px #6bfb82, 0 0 40px #6bfb82;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .6; transform: scale(1.3); }
  }

  .series {
    position: absolute; bottom: 65px; right: 80px;
    display: flex; gap: 12px; z-index: 3;
  }
  .series .dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,.25); border: 2px solid rgba(255,255,255,.4);
  }
  .series .dot.active {
    background: #6bfb82; border-color: #6bfb82;
    box-shadow: 0 0 12px #6bfb82;
  }

  .brand {
    position: absolute; bottom: 130px; right: 80px;
    font-size: 28px; font-weight: 700; color: rgba(255,255,255,.5);
    letter-spacing: 4px; z-index: 2; text-align: right;
  }

  /* Diagonal accent line */
  .diag {
    position: absolute; top: 0; left: 50%;
    width: 4px; height: 200%; background: linear-gradient(180deg, #6bfb82 0%, transparent 60%);
    transform: rotate(25deg); transform-origin: top center;
    opacity: .15; z-index: 1;
  }
</style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="diag"></div>

  <div class="avatar"><span>P</span></div>
  <div class="green-dot"></div>

  <div class="day">
    DAN 2
    <small>AI UNIVERSA</small>
  </div>

  <div class="subtitle">AI Agency<br>Workflows</div>

  <div class="badge">LIVE · 16. APRIL · 19:00</div>

  <div class="brand">AIUNIVERSA.SI</div>
  <div class="series">
    <div class="dot"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
  </div>

  <div class="green-accent"></div>
</body>
</html>
