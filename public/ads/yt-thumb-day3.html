<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>AI Universa — Dan 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #0a0a12;
    position: relative;
  }
  .glow {
    position: absolute; border-radius: 50%; filter: blur(120px);
  }
  .glow-1 { width: 800px; height: 800px; background: #7c3aed; top: -250px; left: 50%; transform: translateX(-50%); opacity: .55; }
  .glow-2 { width: 400px; height: 400px; background: #6bfb82; bottom: -150px; right: 100px; opacity: .2; }
  .glow-3 { width: 500px; height: 500px; background: #b388ff; bottom: -200px; left: -100px; opacity: .3; }

  .avatar {
    position: absolute; top: 50%; left: 80px; transform: translateY(-50%);
    width: 280px; height: 280px; border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #b388ff, #6bfb82);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 80px rgba(124,58,237,.7), 0 0 160px rgba(107,251,130,.3);
    z-index: 2;
  }
  .avatar span {
    font-size: 150px; font-weight: 900; color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,.4);
  }

  .day {
    position: absolute; top: 40px; right: 80px;
    font-size: 200px; font-weight: 900; color: #fff;
    line-height: 1; z-index: 2;
    text-shadow: 0 0 50px rgba(179,136,255,.8), 0 0 100px rgba(124,58,237,.5);
  }
  .day small {
    font-size: 72px; display: block; font-weight: 700;
    color: #b388ff; margin-top: -10px;
  }

  .subtitle {
    position: absolute; bottom: 220px; right: 80px;
    font-size: 46px; font-weight: 900; color: #fff;
    text-align: right; z-index: 2;
    text-shadow: 0 2px 20px rgba(0,0,0,.6);
    max-width: 700px;
  }

  .badge {
    position: absolute; bottom: 60px; right: 80px;
    background: rgba(124,58,237,.85);
    border: 2px solid #b388ff;
    border-radius: 50px; padding: 16px 40px;
    font-size: 32px; font-weight: 700; color: #fff;
    letter-spacing: 2px; z-index: 2;
    box-shadow: 0 0 30px rgba(124,58,237,.5);
  }

  /* Car prize banner — the money element */
  .prize {
    position: absolute; top: 50px; left: 420px;
    background: linear-gradient(135deg, #6bfb82, #34d058);
    border-radius: 16px; padding: 14px 32px;
    font-size: 36px; font-weight: 900; color: #0a0a12;
    z-index: 3;
    box-shadow: 0 0 40px rgba(107,251,130,.5), 0 0 80px rgba(107,251,130,.2);
    transform: rotate(-3deg);
    letter-spacing: 1px;
  }

  .green-accent {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 10px;
    background: linear-gradient(90deg, #6bfb82, #b388ff, #6bfb82);
    z-index: 3;
  }

  /* Animated energy lines */
  .energy {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1; overflow: hidden;
  }
  .energy::before, .energy::after {
    content: ''; position: absolute;
    width: 3px; height: 200%;
    background: linear-gradient(180deg, transparent, #b388ff, transparent);
    opacity: .12;
  }
  .energy::before { left: 30%; transform: rotate(20deg); top: -50%; }
  .energy::after { right: 25%; transform: rotate(-15deg); top: -50%; }

  .series {
    position: absolute; bottom: 65px; left: 80px;
    display: flex; gap: 12px; z-index: 3;
  }
  .series .dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,.25); border: 2px solid rgba(255,255,255,.4);
  }
  .series .dot.active {
    background: #6bfb82; border-color: #6bfb82;
    box-shadow: 0 0 12px #6bfb82;
  }

  .brand {
    position: absolute; bottom: 130px; left: 80px;
    font-size: 28px; font-weight: 700; color: rgba(255,255,255,.5);
    letter-spacing: 4px; z-index: 2;
  }

  /* Sparkle accents */
  .sparkle {
    position: absolute; z-index: 3;
    font-size: 32px;
  }
  .sparkle-1 { top: 120px; left: 400px; }
  .sparkle-2 { bottom: 180px; left: 350px; }
</style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>
  <div class="energy"></div>

  <div class="avatar"><span>P</span></div>

  <div class="prize">🚗 ŽREBANJE ZA AVTO!</div>

  <div class="sparkle sparkle-1">✨</div>
  <div class="sparkle sparkle-2">🔥</div>

  <div class="day">
    DAN 3
    <small>AI UNIVERSA</small>
  </div>

  <div class="subtitle">AI Agenti &amp;<br>Claw Bot V ŽIVO!</div>

  <div class="badge">LIVE · 17. APRIL · 19:00</div>

  <div class="brand">AIUNIVERSA.SI</div>
  <div class="series">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
  </div>

  <div class="green-accent"></div>
</body>
</html>
